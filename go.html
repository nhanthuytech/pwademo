<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Redirect ngay tới URL đích - chỉ cần sửa URL ở đây -->
    <meta http-equiv="refresh" content="0;url=https://developer.android.com/">
    <title>Đang mở ứng dụng...</title>
    <style>
        body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#073042; color:#fff; font-family:sans-serif; }
        .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.2); border-top:4px solid #3DDC84; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align:center">
        <div class="spinner"></div>
        <p>Đang mở ứng dụng...</p>
    </div>
</body>
</html>
